name: Daily Tech News Bot

on:
  schedule:
    # 06:00 UTC corresponds to exactly 7:00 AM Lagos time
    - cron: '0 6 * * *'
  workflow_dispatch: # Allows you to manually trigger the bot using a button on GitHub!

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Clone Code Repository
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests urllib3 python-dotenv

    - name: Execute News Pipeline
      run: python main.py
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
